services:
  postgres:
    image: postgres:16-alpine
    container_name: concierge-db
    environment:
      POSTGRES_DB: concierge_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d concierge_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      # Map your local SQL file to the magic init folder
      - ./sql-init:/docker-entrypoint-initdb.d
    networks:
      - concierge-net


  broker:
    image: confluentinc/cp-kafka:7.5.0
    container_name: concierge-broker
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
      # CRITICAL: Backend uses 'broker:29092', Host uses 'localhost:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - concierge-net

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: concierge-kafdrop
    restart: always
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: "concierge-broker:29092" # Points to your Kafka container
      JVM_OPTS: "-Xms32M -Xmx64M"
      SERVER_SERVLET_CONTEXTPATH: "/"
    depends_on:
      - broker
    networks:
      - concierge-net

  backend:
    build: ./backend
    container_name: concierge-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/concierge_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: broker:29092
    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - concierge-net

  frontend:
    build:
      context: ./frontend
    container_name: concierge-frontend
    ports:
      - "5173:5173" # Vite's default port
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    networks:
      - concierge-net
    depends_on:
      backend:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - concierge-net
volumes:
  redis_data:


networks:
  concierge-net:
    driver: bridge


