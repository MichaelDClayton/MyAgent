services:
  postgres:
    image: postgres:16-alpine
    container_name: concierge-db
    environment:
      POSTGRES_DB: concierge_db # Matches application.yml
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d concierge_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Simplified Kafka setup (Single Node)
  broker:
    image: confluentinc/cp-kafka:7.5.0
    container_name: concierge-broker
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      # ADDED 'PLAINTEXT' to mapping to ensure internal comms are open
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:29093'
      # FIX: Listeners must use the service name 'broker', not 'concierge-broker'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1


  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: concierge-kafdrop
    restart: always
    ports:
      - "9000:9000"
    environment:
      # FIX: Changed from 'concierge-broker' to 'broker'
      KAFKA_BROKERCONNECT: "broker:29092"
      JVM_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      - broker

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile # Ensure path is correct
    container_name: concierge-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/concierge_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: broker:29092
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT

    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: concierge-frontend
    ports:
      - "5173:5173" # Vite's default port
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
