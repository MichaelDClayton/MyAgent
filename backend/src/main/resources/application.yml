spring:
  application:
    name: concierge-booking-bot

  datasource:
    # Use the service name 'postgres' defined in your docker-compose.yml
    url: jdbc:postgresql://postgres:5432/concierge_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    # This helps Spring Boot retry the connection a few times on startup
    hikari:
      initialization-fail-timeout: 3000

  jpa:
    # Change 'validate' to 'none' temporarily to see if it boots,
    # or keep 'validate' and ensure Postgres is healthy first.
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        # Explicitly set the dialect to bypass the metadata check
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # This prevents the app from crashing if the DB is 1 second late
        temp:
          use_jdbc_metadata_defaults: false
    show-sql: true
  kafka:
    bootstrap-servers: broker:29092
    producer:
      security.protocol: PLAINTEXT
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: true
      consumer:
        bootstrap-servers: broker:29092
        group-id: concierge-group
        auto-offset-reset: earliest
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
        properties:
          # Trust your model package to allow object creation
          spring.json.trusted.packages: "com.concierge.backend.model"
          # Match the producer's mapping: "alias:FullClassName"
          spring.json.type.mapping: "chat:com.concierge.backend.model.ChatRequest"

  resilience4j:
    retry:
      instances:
        kafkaProducerRetry:
          maxAttempts: 3
          waitDuration: 2s
    circuitbreaker:
      instances:
        kafkaProducer:
          registerHealthIndicator: true
          slidingWindowSize: 10
          minimumNumberOfCalls: 5
          waitDurationInOpenState: 15s
          failureRateThreshold: 50

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,circuitbreakers" #
  health:
    circuitbreakers:
      enabled: true
    # ADD THIS: Forces Resilience4j to export metrics to Actuator
    resilience4j:
      enabled: true
  endpoint:
    health:
      show-details: always

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

logging:
  level:
    org.springframework.web.servlet.handler.HandlerMappingIntrospector: OFF
